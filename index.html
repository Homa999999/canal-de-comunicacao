<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apps-script-url" content="https://script.google.com/macros/s/AKfycbwcXzraHIvXYGsR3G64Yh2CucojllP6Z274UHjH0YVYwcn5HFyRYWR80b36oQ2c8Y8I/exec">
    <title>Canal de comunicação</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-icon">
            <i class="fa-solid fa-people-group"></i>
        </div>
        <h1>Canal de comunicação</h1>
        <p>
            Este canal garante confidencialidade e segurança para registrar denúncias,
            sugestões ou relatos relacionados ao ambiente de trabalho.
        </p>
    </div>

    <form id="form">

        <div class="campo">
            <label for="nome">
                <i class="fa-regular fa-user"></i>
                Nome <span>(opcional)</span>
            </label>
            <div class="input-wrap">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
            </div>
        </div>

        <div class="campo">
            <label for="tipo">
                <i class="fa-solid fa-tag"></i>
                Tipo da ocorrência
            </label>
            <div class="input-wrap">
                <i class="fa-solid fa-list input-icon"></i>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione o tipo</option>
                    <option>Assédio Moral</option>
                    <option>Assédio Sexual</option>
                    <option>Condições de Trabalho</option>
                    <option>Segurança</option>
                    <option>Sugestão</option>
                    <option>Outros</option>
                </select>
            </div>
        </div>

        <div class="campo">
            <label for="descricao">
                <i class="fa-solid fa-align-left"></i>
                Descrição
            </label>
            <div class="input-wrap textarea-wrap">
                <textarea
                    id="descricao"
                    rows="6"
                    placeholder="Descreva detalhadamente o ocorrido..."
                    name="descricao"
                    required
                ></textarea>
            </div>
        </div>

        <div class="campo">
            <label for="anexos">
                <i class="fa-solid fa-paperclip"></i>
                Anexar fotos ou documentos
            </label>
            <div class="file-upload">
                <input type="file" id="anexos" multiple name="anexos" accept="image/*,.pdf,.doc,.docx">
                <label for="anexos" class="file-label">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span class="file-text">Clique para selecionar ou arraste os arquivos</span>
                    <small>Máximo de 10 arquivos, 10MB cada</small>
                </label>
            </div>
            <p id="file-list" class="file-list hidden"></p>
        </div>

        <button type="submit" id="btn-enviar">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Enviar denúncia</span>
        </button>

    </form>

</div>

<div id="loading-overlay" class="loading-overlay hidden" aria-live="polite" aria-busy="false">
    <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p id="loading-message"></p>
    </div>
</div>

<script src="script.js" defer></script>

</body>
</html>
